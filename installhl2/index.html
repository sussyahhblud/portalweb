<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Half-Life 2</title>
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
			}
			iframe {
				width: 100%;
				height: 100%;

			}

	</head>
	<body style="text-align: center; color: white">
		<h1>Half-Life 2</h1>

			half life 2 can't be played in the iframe, click the button below to open

		</p>
		<p>TIPS: use C for crouching instead of ctrl to avoid shortcuts</p>
		<p>BUGS: faces are messed up, water is black. this will be fixed later</p>
		<button
			onclick="
				window.open('/assets/storage/webgl/hl2/hl2_launcher.html', '_blank')
			"
		>
			Open Half-Life 2
		</button>
	</body>
</html>
