<!DOCTYPE HTML>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/sussyahhblud/portalweb@main/gamelogos/PortalLogo.png">
  <title>Portal</title>
  <style>
    body { font-family: arial; margin: 0; padding: none; background: #111; color: #fff; }
    .emscripten { padding-right: 0; margin-left: auto; margin-right: auto; display: block; }
    div.emscripten { text-align: center; }
    div.emscripten_border { border: 1px solid black; }
    canvas.emscripten { border: 0px none; background-color: black; }
    #emscripten_logo { display: inline-block; margin: 0; padding: 6px; width: 200px; }

    .spinner {
      height: 30px; width: 30px; margin: 0; margin-top: 20px; margin-left: 20px; display: inline-block; vertical-align: top;
      -webkit-animation: rotation .8s linear infinite;
      -moz-animation: rotation .8s linear infinite;
      -o-animation: rotation .8s linear infinite;
      animation: rotation 0.8s linear infinite;
      border-left: 5px solid rgb(235, 235, 235);
      border-right: 5px solid rgb(235, 235, 235);
      border-bottom: 5px solid rgb(235, 235, 235);
      border-top: 5px solid #00bcff;
      border-radius: 100%;
      background-color: #00bcff;
    }
    @-webkit-keyframes rotation { from {-webkit-transform: rotate(0deg);} to {-webkit-transform: rotate(360deg);} }
    @-moz-keyframes rotation { from {-moz-transform: rotate(0deg);} to {-moz-transform: rotate(360deg);} }
    @-o-keyframes rotation { from {-o-transform: rotate(0deg);} to {-o-transform: rotate(360deg);} }
    @keyframes rotation { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

    #status { display: inline-block; vertical-align: top; margin-top: 30px; margin-left: 20px; font-weight: bold; color: rgb(120, 120, 120); }
    #output {
      width: 100%; height: 200px; margin: 0 auto; margin-top: 10px;
      border-left: 0px; border-right: 0px; padding-left: 0px; padding-right: 0px;
      display: block; background-color: black; color: white;
      font-family: 'Lucida Console', Monaco, monospace; outline: none;
    }

    #progress {
      height: 12px;
      width: 320px;
      -webkit-appearance: none;
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background-color: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
      margin-top: 10px;
    }
    #progress::-webkit-progress-bar { background-color: transparent; }
    #progress::-webkit-progress-value {
      background: linear-gradient(90deg, #0077ff, #00bcff);
      box-shadow: 0 0 10px rgba(0, 188, 255, 0.5);
      border-radius: 10px;
    }
    #progress::-moz-progress-bar { background-color: #00bcff; border-radius: 10px; }
  </style>
</head>
<body>
  <a href="/" target="_top"><img id="emscripten_logo" src="assets/portal.svg"></a>

  <div class="spinner" id="spinner"></div>
  <div class="emscripten" id="status">Downloading...</div>

  <div class="emscripten">
    <progress value="0" max="100" id="progress" hidden="1"></progress>
  </div>

  <div class="emscripten_border">
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>

  <textarea id="output" rows="8"></textarea>

  <script type="text/javascript">
    var statusElement = document.getElementById('status');
    var progressElement = document.getElementById('progress');
    var spinnerElement = document.getElementById('spinner');
    var canvasElement = document.getElementById('canvas');
    var outputElement = document.getElementById('output');
    if (outputElement) outputElement.value = '';

    canvasElement.addEventListener('webglcontextlost', (e) => {
      alert('WebGL context lost. You will need to reload the page.');
      e.preventDefault();
    }, false);

    canvasElement.widthNative = screen.availWidth;
    canvasElement.heightNative = screen.availHeight;

    var Module = {
      print(...args) {
        console.log(...args);
        if (outputElement) {
          var text = args.join(' ');
          outputElement.value += text + "\n";
          outputElement.scrollTop = outputElement.scrollHeight;
        }
      },
      canvas: canvasElement,
      setStatus(text) {
        Module.setStatus.last ??= { time: Date.now(), text: '' };
        if (text === Module.setStatus.last.text) return;
        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        var now = Date.now();
        if (m && now - Module.setStatus.last.time < 30) return;
        Module.setStatus.last.time = now;
        Module.setStatus.last.text = text;
        if (m) {
          text = m[1];
          progressElement.value = parseInt(m[2]) * 100;
          progressElement.max = parseInt(m[4]) * 100;
          progressElement.hidden = false;
          spinnerElement.hidden = false;
        } else {
          progressElement.value = null;
          progressElement.max = null;
          progressElement.hidden = true;
          if (!text) spinnerElement.style.display = 'none';
        }
        statusElement.innerHTML = text;
      },
      totalDependencies: 0,
      monitorRunDependencies(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
      }
    };

    Module.setStatus('Downloading...');

    window.onerror = (event) => {
      Module.setStatus('Exception thrown, see JavaScript console');
      spinnerElement.style.display = 'none';
      Module.setStatus = (text) => { if (text) console.error('[post-exception status] ' + text); };
    };
  </script>

  <script async type="text/javascript" src="portal_launcher.js"></script>
</body>
</html>
